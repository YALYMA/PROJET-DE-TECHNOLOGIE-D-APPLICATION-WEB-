spring.application.name=unchk-backend

# ── Serveur ──────────────────────────────────────────────────────────────────
server.port=8080

# ── Base de données MySQL ────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/unchk_db?useSSL=false&serverTimezone=Africa/Dakar&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Initialisation SQL (données initiales via INSERT IGNORE) ─────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

# ── JWT ──────────────────────────────────────────────────────────────────────
uck.jwt.secret=${JWT_SECRET:unchk-secret-key-tres-longue-et-securisee-2026-changez-en-prod}
uck.jwt.expiration=86400000
uck.jwt.refresh-expiration=604800000

# ── Upload ───────────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
uck.upload.path=${UPLOAD_PATH:./uploads}

# ── CORS ─────────────────────────────────────────────────────────────────────
uck.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
info.app.name=UNCHK Backend
info.app.version=2.0.0

# ── Logs ─────────────────────────────────────────────────────────────────────
logging.level.sn.uck=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/unchk-backend.log

# ── Pagination ───────────────────────────────────────────────────────────────
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
